<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Catálogo | Mawi's Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" href="logo1.png" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #000;
        color: #fff;
        overflow-x: hidden;
      }

      /* ====== BACKGROUND ====== */
      .catalog-hero {
        min-height: 100vh;
        background: url("fondo.jpeg") center/cover no-repeat;
        position: relative;
        padding-bottom: 60px;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
      }

      /* ====== NAVBAR ====== */
      .navbar {
        position: relative;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 25px 70px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 28px;
        font-weight: 700;
        color: #ff7ac8;
      }

      .menu {
        display: flex;
        align-items: center;
        gap: 35px;
      }

      .menu a {
        text-decoration: none;
        color: #fff;
        font-weight: 500;
        transition: 0.3s;
      }

      .menu a:hover {
        color: #ff7ac8;
      }

      .btn-support {
        background: linear-gradient(135deg, #ff4fa3, #ff86c8);
        padding: 10px 22px;
        border-radius: 30px;
        color: #fff !important;
        font-weight: 600;
      }

      /* ====== TITLE ====== */
      .catalog-title {
        position: relative;
        z-index: 3;
        text-align: center;
        font-size: 56px;
        margin: 40px 0 50px;
        background: linear-gradient(135deg, #ff5fb2, #ffc1e6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
      }

      /* ====== GRID ====== */
      .catalog-container {
        position: relative;
        z-index: 3;
        width: 90%;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 30px;
      }

      .catalog-card {
        background: rgba(0, 0, 0, 0.25);
        border: 2px solid rgba(255, 105, 180, 0.6); /* contorno rosa */
        box-shadow: 0 0 25px rgba(255, 105, 180, 0.25),
          0 0 60px rgba(255, 105, 180, 0.15);
        backdrop-filter: blur(12px);
        border-radius: 25px;
        padding: 25px 20px 30px;
        text-align: center;
        transition: 0.35s;
      }

      .catalog-card:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 0 35px rgba(255, 105, 180, 0.45),
          0 0 90px rgba(255, 105, 180, 0.35);
        background: rgba(0, 0, 0, 0.18);
        border-color: #ff6fc7;
      }

      .catalog-card img {
        max-width: 140px;
        margin-bottom: 15px;
        filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.6));
        background: transparent;
      }

      .catalog-card h3 {
        font-size: 22px;
        margin-bottom: 15px;
        color: #ffd1ea;
      }

      .btn-ver {
        display: inline-block;
        background: linear-gradient(135deg, #ff4fa3, #ff86c8);
        padding: 10px 30px;
        border-radius: 25px;
        text-decoration: none;
        color: #fff;
        font-weight: 600;
        box-shadow: 0 0 20px rgba(255, 105, 180, 0.6);
        transition: 0.3s;
      }

      .btn-ver:hover {
        transform: scale(1.05);
      }

      /* ====== BACK BUTTON ====== */
      .back-home {
        position: relative;
        z-index: 3;
        text-align: center;
        margin-top: 50px;
      }

      .btn-home {
        display: inline-block;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 12px 28px;
        border-radius: 30px;
        text-decoration: none;
        color: #fff;
        backdrop-filter: blur(10px);
        transition: 0.3s;
      }

      .btn-home:hover {
        background: rgba(0, 0, 0, 0.25);
        box-shadow: 0 0 25px rgba(255, 105, 180, 0.3);
      }

      /* ====== RESPONSIVE ====== */
      @media (max-width: 1100px) {
        .catalog-container {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 600px) {
        .catalog-container {
          grid-template-columns: 1fr;
        }
        .catalog-title {
          font-size: 40px;
        }
        .navbar {
          padding: 20px 25px;
        }
      }
    </style>
  </head>
  <body>
    <section class="catalog-hero">
      <div class="overlay"></div>

      <!-- NAVBAR -->
      <nav class="navbar">
        <div class="logo">👑 Mawi's Store</div>
        <div class="menu">
          <a href="index.html">Inicio</a>
          <a href="catalogo.html">Catálogo</a>
          <a href="index.html#contacto">Contacto</a>
          <a href="index.html#soporte">Soporte</a>
          <a href="index.html#soporte" class="btn-support">Soporte</a>
        </div>
      </nav>

      <h1 class="catalog-title">CATÁLOGO</h1>

      <!-- GRID -->
      <div class="catalog-container">
        <div class="catalog-card">
          <img src="diamantes.png" alt="Diamantes" />
          <h3>Diamantes</h3>
          <a href="diamantes.html" class="btn-ver">Ver</a>
        </div>

        <div class="catalog-card">
          <img src="gemas.png" alt="Gemas" />
          <h3>Gemas</h3>
          <a href="gemas.html" class="btn-ver">Ver</a>
        </div>

        <div class="catalog-card">
          <img src="bot.png" alt="Bots" />
          <h3>Bots</h3>
          <a href="bots.html" class="btn-ver">Ver</a>
        </div>

        <div class="catalog-card">
          <img src="recursos.png" alt="Recursos" />
          <h3>Recursos</h3>
          <a href="recursos.html" class="btn-ver">Ver</a>
        </div>

        <div class="catalog-card">
          <img src="pases.png" alt="Pases" />
          <h3>Pases</h3>
          <a href="pases.html" class="btn-ver">Ver</a>
        </div>

        <div class="catalog-card">
          <img src="kills.png" alt="Kills" />
          <h3>Kills</h3>
          <a href="kills.html" class="btn-ver">Ver</a>
        </div>

        <div class="catalog-card">
          <img src="cuentas.png" alt="Cuentas" />
          <h3>Cuentas</h3>
          <a href="cuenta.html" class="btn-ver">Ver</a>
        </div>

        <div class="catalog-card">
          <img src="gremios.png" alt="Gremios" />
          <h3>Gremios</h3>
          <a href="gremios.html" class="btn-ver">Ver</a>
        </div>
      </div>

      <!-- BACK -->
      <div class="back-home">
        <a href="index.html" class="btn-home">⬅ Volver al inicio</a>
      </div>
    </section>
  </body>
</html>
