<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Recursos | Mari's Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="logo1.png" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      body {
        background: #000;
        color: #fff;
        overflow-x: hidden;
      }

      .recursos-hero {
        min-height: 100vh;
        background: url("fondo.jpeg") center/cover no-repeat;
        position: relative;
        padding-bottom: 80px;
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
      }

      .navbar {
        position: relative;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 25px 70px;
      }
      .logo {
        font-size: 28px;
        font-weight: 700;
        color: #ff7ac8;
      }

      .back-btn {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 10px 18px;
        border-radius: 50%;
        color: #fff;
        text-decoration: none;
        backdrop-filter: blur(10px);
      }

      .title-box {
        text-align: center;
        position: relative;
        z-index: 3;
        margin: 30px 0 40px;
      }
      .title-box h1 {
        font-size: 52px;
        background: linear-gradient(135deg, #ff5fb2, #ffc1e6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .title-box p {
        color: #ddd;
        margin-top: 10px;
        font-size: 18px;
      }

      .grid {
        position: relative;
        z-index: 3;
        width: 92%;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 25px;
      }

      .card {
        background: rgba(0, 0, 0, 0.25);
        border: 2px solid rgba(255, 105, 180, 0.6);
        border-radius: 22px;
        padding: 18px;
        text-align: center;
        backdrop-filter: blur(12px);
        box-shadow: 0 0 25px rgba(255, 105, 180, 0.25);
      }

      .card img {
        max-width: 120px;
        margin: 10px auto 15px;
        display: block;
        filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.6));
        background: transparent;
      }

      .card h3 {
        margin-bottom: 10px;
        color: #ffd1ea;
      }

      .list {
        font-size: 15px;
        color: #fff;
        margin-bottom: 15px;
      }
      .list div {
        display: flex;
        justify-content: space-between;
        margin: 6px 0;
      }

      .buy-btn {
        background: linear-gradient(135deg, #ff4fa3, #ff86c8);
        border: none;
        padding: 10px 25px;
        border-radius: 25px;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(255, 105, 180, 0.6);
      }

      /* MIX RSS */
      .mix-box {
        position: relative;
        z-index: 3;
        width: 90%;
        margin: 60px auto 0;
        background: rgba(0, 0, 0, 0.25);
        border: 2px solid rgba(255, 105, 180, 0.6);
        border-radius: 25px;
        padding: 25px;
        backdrop-filter: blur(12px);
        text-align: center;
      }
      .mix-title {
        font-size: 24px;
        color: #ffd1ea;
        margin-bottom: 20px;
      }

      .mix-pages {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 15px;
        align-items: center;
      }
      .mix-pages button {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        padding: 8px 14px;
        border-radius: 20px;
        cursor: pointer;
      }

      .mix-buy {
        margin-top: 25px;
      }

      /* MODALS */
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }
      .modal-box {
        position: relative;
        background: rgba(0, 0, 0, 0.85);
        border: 2px solid rgba(255, 105, 180, 0.6);
        border-radius: 25px;
        padding: 25px;
        backdrop-filter: blur(12px);
        text-align: center;
        min-width: 300px;
      }
      .modal-box h3 {
        margin-bottom: 15px;
        color: #ffd1ea;
      }
      .modal-box button {
        margin: 8px;
        background: linear-gradient(135deg, #ff4fa3, #ff86c8);
        border: none;
        padding: 10px 20px;
        border-radius: 20px;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      .modal-close {
        position: absolute;
        top: 10px;
        right: 12px;
        background: none;
        border: none;
        color: #fff;
        font-size: 18px;
        cursor: pointer;
      }
      .modal-cancel {
        background: #444 !important;
      }

      @media (max-width: 1100px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 600px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .title-box h1 {
          font-size: 38px;
        }
      }
    </style>
  </head>
  <body>
    <section class="recursos-hero">
      <div class="overlay"></div>

      <nav class="navbar">
        <div class="logo">👑 Mari's Store</div>
        <a href="catalogo.html" class="back-btn">⬅</a>
      </nav>

      <div class="title-box">
        <h1>RECURSOS</h1>
        <p id="kingdomTitle">Reino K1 - K1090</p>
      </div>

      <div class="grid" id="resourceGrid"></div>

      <!-- MIX -->
      <div class="mix-box">
        <div class="mix-title" id="mixTitle">RSS Mixtos - Reino K1 - K1090</div>
        <div class="mix-pages">
          <button onclick="prevKingdom()">⬅</button>
          <span id="pageText">1 / 5</span>
          <button onclick="nextKingdom()">➡</button>
        </div>
        <div class="mix-buy">
          <button class="buy-btn" onclick="openMix()">
            Comprar RSS Mixtos
          </button>
        </div>
      </div>
    </section>

    <!-- MODALS -->
    <div class="modal" id="modalOptions">
      <div class="modal-box">
        <button class="modal-close" onclick="closeModals()">✖</button>
        <h3>Selecciona paquete</h3>
        <button onclick="selectMix('4B cada recurso')">4B cada recurso</button>
        <button onclick="selectMix('3B cada recurso')">3B cada recurso</button>
        <button onclick="selectMix('2B cada recurso')">2B cada recurso</button>
        <button onclick="selectMix('4-4-4-4-2')">4-4-4-4-2</button>
        <button class="modal-cancel" onclick="closeModals()">Cancelar</button>
      </div>
    </div>

    <div class="modal" id="modalAdmin">
      <div class="modal-box">
        <button class="modal-close" onclick="closeModals()">✖</button>
        <h3>Comprar con</h3>
        <button onclick="sendWA('Allin')">Allin</button>
        <button onclick="sendWA('Mariana')">Mariana</button>
        <button class="modal-cancel" onclick="closeModals()">Cancelar</button>
      </div>
    </div>

    <script>
      const admins = { Allin: "33768349928", Mariana: "5492932445245" };

      const kingdoms = [
        { name: "K1 - K1090", prices: [3.6, 3.4, 3.2, 3.0] },
        { name: "K1091 - K1820", prices: [3.8, 3.6, 3.4, 3.2] },
        { name: "K1821 - K1909", prices: [4.0, 3.8, 3.6, 3.4] },
        { name: "K1910 - K1925", prices: [4.2, 4.0, 3.8, 3.6] },
        { name: "Entrega 24h K1 - K1820", prices: [4.5, 4.3, 4.1, 3.9] },
      ];

      const resources = ["Comida", "Piedra", "Madera", "Mineral", "Oro"];
      let currentKingdom = 0;
      let selectedProduct = "";
      let mixOption = "";

      function render() {
        const grid = document.getElementById("resourceGrid");
        grid.innerHTML = "";
        resources.forEach((r) => {
          const p = kingdoms[currentKingdom].prices;
          grid.innerHTML += `
  <div class="card">
    <img src="${r.toLowerCase()}.png">
    <h3>${r}</h3>
    <div class="list">
      <div><span>1B</span><span>$${p[0].toFixed(2)}</span></div>
      <div><span>2B</span><span>$${p[1].toFixed(2)}</span></div>
      <div><span>4B</span><span>$${p[2].toFixed(2)}</span></div>
      <div><span>8B</span><span>$${p[3].toFixed(2)}</span></div>
    </div>
    <button class="buy-btn" onclick="buySingle('${r}')">Comprar</button>
  </div>`;
        });
        document.getElementById("kingdomTitle").innerText =
          "Reino " + kingdoms[currentKingdom].name;
        document.getElementById("mixTitle").innerText =
          "RSS Mixtos - Reino " + kingdoms[currentKingdom].name;
        document.getElementById("pageText").innerText =
          currentKingdom + 1 + " / 5";
      }

      function nextKingdom() {
        if (currentKingdom < 4) {
          currentKingdom++;
          render();
        }
      }
      function prevKingdom() {
        if (currentKingdom > 0) {
          currentKingdom--;
          render();
        }
      }

      function buySingle(p) {
        selectedProduct = p;
        document.getElementById("modalAdmin").style.display = "flex";
      }
      function openMix() {
        document.getElementById("modalOptions").style.display = "flex";
      }
      function selectMix(opt) {
        mixOption = opt;
        document.getElementById("modalOptions").style.display = "none";
        document.getElementById("modalAdmin").style.display = "flex";
      }

      function closeModals() {
        document.getElementById("modalOptions").style.display = "none";
        document.getElementById("modalAdmin").style.display = "none";
        mixOption = "";
        selectedProduct = "";
      }

      function sendWA(admin) {
        const number = admins[admin];
        let msg = "";
        if (mixOption != "")
          msg = `Pedido RSS mixtos: ${mixOption} | Reino ${kingdoms[currentKingdom].name}`;
        else
          msg = `Pedido recurso: ${selectedProduct} | Reino ${kingdoms[currentKingdom].name}`;
        window.open(
          `https://wa.me/${number}?text=${encodeURIComponent(msg)}`,
          "_blank"
        );
        closeModals();
      }

      render();
    </script>
  </body>
</html>
