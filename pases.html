<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Pases | Mawi's Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #050010;
        color: #fff;
        overflow-x: hidden;
      }

      .hero {
        min-height: 100vh;
        background: radial-gradient(circle at top, #2a003f, #050010 70%);
        position: relative;
        padding-bottom: 80px;
      }

      .stars {
        position: absolute;
        inset: 0;
        background: url("fondo.jpeg") center/cover repeat;
        opacity: 0.25;
      }

      .navbar {
        position: relative;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 25px 70px;
      }

      .logo {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, #ff5fb2, #8ad6ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .nav-links a {
        color: #fff;
        text-decoration: none;
        margin: 0 15px;
        font-weight: 500;
      }

      .section-title {
        text-align: center;
        margin: 60px 0 30px;
        font-size: 48px;
        background: linear-gradient(135deg, #6fd6ff, #ff5fb2, #fff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .grid {
        width: 90%;
        margin: 30px auto;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 30px;
      }

      .card {
        background: rgba(10, 0, 25, 0.45);
        border: 2px solid rgba(138, 214, 255, 0.35);
        border-radius: 26px;
        padding: 30px;
        text-align: center;
        backdrop-filter: blur(14px);
        box-shadow: 0 0 40px rgba(138, 214, 255, 0.15);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-8px) scale(1.02);
      }

      .pass-img {
        width: 120px;
        display: block;
        margin: 0 auto 15px;
        filter: drop-shadow(0 0 20px rgba(138, 214, 255, 0.7));
      }

      .pass-name {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 10px;
        color: #bfe9ff;
      }

      .price {
        font-size: 22px;
        margin-bottom: 20px;
        color: #ffd1ea;
      }

      .buy-btn {
        background: linear-gradient(135deg, #6fd6ff, #ff4fa3);
        border: none;
        padding: 12px 30px;
        border-radius: 30px;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }

      .modal-box {
        background: rgba(5, 0, 20, 0.9);
        border-radius: 26px;
        padding: 30px;
        width: 90%;
        max-width: 420px;
        text-align: center;
        position: relative;
      }

      .close {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 22px;
        cursor: pointer;
      }

      .admin-btn {
        width: 100%;
        margin: 10px 0;
        padding: 12px;
        border-radius: 25px;
        border: none;
        background: linear-gradient(135deg, #6fd6ff, #ff4fa3);
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }

      .cancel-btn {
        margin-top: 15px;
        background: transparent;
        border: 1px solid #8ad6ff;
        color: #cceeff;
        padding: 10px 25px;
        border-radius: 25px;
        cursor: pointer;
      }

      @media (max-width: 800px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .section-title {
          font-size: 36px;
        }
      }
    </style>
  </head>

  <body>
    <section class="hero">
      <div class="stars"></div>

      <nav class="navbar">
        <div class="logo">💎 Mawi’s Store</div>

        <div class="nav-links">
          <a href="index.html">Inicio</a>
          <a href="diamantes.html">Diamantes</a>
        </div>
      </nav>

      <h2 class="section-title">Pases Mensuales</h2>

      <div class="grid">
        <div class="card">
          <img src="pasesgemas.jpeg" class="pass-img" />
          <div class="pass-name">Oro + Plata</div>
          <div class="price">$4.80 USD</div>
          <button class="buy-btn">Comprar</button>
        </div>

        <div class="card">
          <img src="pase1999.jpeg" class="pass-img" />
          <div class="pass-name">Diamantes</div>
          <div class="price">$19.80 USD</div>
          <button class="buy-btn">Comprar</button>
        </div>
      </div>

      <h2 class="section-title">Pases Semanales</h2>

      <div class="grid">
        <div class="card">
          <img src="pase199.jpeg" class="pass-img" />
          <div class="pass-name">Diamantes</div>
          <div class="price">$2.30 USD</div>
          <button class="buy-btn">Comprar</button>
        </div>

        <div class="card">
          <img src="libros.jpeg" class="pass-img" />
          <div class="pass-name">Arcaico</div>
          <div class="price">$5.90 USD</div>
          <button class="buy-btn">Comprar</button>
        </div>

        <div class="card">
          <img src="artefactos.jpeg" class="pass-img" />
          <div class="pass-name">Artefactos</div>
          <div class="price">$11.80 USD</div>
          <button class="buy-btn">Comprar</button>
        </div>

        <div class="card">
          <img src="astralita.jpeg" class="pass-img" />
          <div class="pass-name">Astralite</div>
          <div class="price">$16.80 USD</div>
          <button class="buy-btn">Comprar</button>
        </div>
      </div>
    </section>

    <div class="modal" id="modal">
      <div class="modal-box">
        <div class="close">✖</div>

        <h2>Selecciona un admin</h2>

        <p id="productName"></p>

        <button class="admin-btn" data-phone="5492932445245">Mariana</button>

        <button class="admin-btn" data-phone="33768349928">Ailin</button>

        <button class="cancel-btn">Cancelar</button>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        let selectedProduct = "";
        let selectedPower = "";
        let requiresPower = false;

        const modal = document.getElementById("modal");
        const productName = document.getElementById("productName");

        document.querySelectorAll(".buy-btn").forEach((btn) => {
          btn.addEventListener("click", function () {
            const card = this.closest(".card");

            const name = card.querySelector(".pass-name").innerText;
            const price = card.querySelector(".price").innerText;

            selectedProduct = name + " - " + price;
            selectedPower = "";
            requiresPower = name.toLowerCase() !== "diamantes";

            if (requiresPower) {
              let power = prompt("Ingresa el poder de la cuenta:");

              if (!power) return;

              selectedPower = power;

              alert("⚠ El precio puede cambiar dependiendo el poder.");
            }

            productName.innerText =
              "Producto: " +
              selectedProduct +
              (selectedPower ? "\nPoder: " + selectedPower : "");

            modal.style.display = "flex";
          });
        });

        document
          .querySelector(".close")
          .addEventListener("click", () => (modal.style.display = "none"));

        document
          .querySelector(".cancel-btn")
          .addEventListener("click", () => (modal.style.display = "none"));

        document.querySelectorAll(".admin-btn").forEach((btn) => {
          btn.addEventListener("click", function () {
            if (!selectedProduct) return;

            const phone = this.getAttribute("data-phone");

            let mensaje =
              "Hola, quiero comprar: " +
              selectedProduct +
              (selectedPower ? " | Poder: " + selectedPower : "") +
              " | Pases - Mawis Store";

            window.location.href =
              "https://wa.me/" + phone + "?text=" + encodeURIComponent(mensaje);
          });
        });
      });
    </script>
  </body>
</html>
